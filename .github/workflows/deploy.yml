name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # manual redeploy of current main to prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: solstice-mcp-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: us-east-1
      ECS_CLUSTER: solstice-prod-cluster
      ECS_SERVICE: solstice-prod-mcp-server
      ECR_REPOSITORY: solstice-prod-mcp
      RESOURCE_URL: https://api.solsticehealth.co/mcp
      BACKEND_BASE_URL: https://api.solsticehealth.co
      BACKEND_AUTH0_CLIENT_ID: P65vxcrfpTUR9HV3NHXM1ISMupr41I3b
      BACKEND_AUTH0_AUDIENCE: https://api.solsticehealth.co/agent-memory
      BACKEND_AUTH0_SCOPE: memory:invoke
      BACKEND_AUTH0_SECRET_ARN: arn:aws:ssm:us-east-1:432113314921:parameter/solstice/prod/AUTH0_CLIENT_SECRET
      # Bedrock AgentCore gateway that fronts this server for MCP clients.
      # It snapshots the tool schema at sync time, so every deploy must re-sync
      # or clients keep seeing the previous deploy's tool list.
      GATEWAY_ID: solstice-mcp-l6apghhxpf
      GATEWAY_TARGET_ID: JB1A75WG68

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify
        run: |
          pip install -r requirements-dev.txt
          ruff check .
          pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA::12}-${GITHUB_RUN_ATTEMPT}"
          docker build --tag "$IMAGE" .
          docker push "$IMAGE"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Register task definition
        id: task
        env:
          IMAGE: ${{ steps.image.outputs.uri }}
        run: |
          TASK_DEFINITION=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "previous_arn=$TASK_DEFINITION" >> "$GITHUB_OUTPUT"
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION" \
            --query taskDefinition > task-definition.json
          jq \
            --arg image "$IMAGE" \
            --arg backend_base_url "$BACKEND_BASE_URL" \
            --arg backend_client_id "$BACKEND_AUTH0_CLIENT_ID" \
            --arg backend_audience "$BACKEND_AUTH0_AUDIENCE" \
            --arg backend_scope "$BACKEND_AUTH0_SCOPE" \
            --arg backend_secret_arn "$BACKEND_AUTH0_SECRET_ARN" \
            '
            (.containerDefinitions[] | select(.name == "mcp-server")) |= (
              .image = $image
              | .environment = (
                  ((.environment // []) | map(select(
                    .name != "SOLSTICE_BACKEND_BASE_URL"
                    and .name != "SOLSTICE_BACKEND_AUTH0_CLIENT_ID"
                    and .name != "SOLSTICE_BACKEND_AUTH0_AUDIENCE"
                    and .name != "SOLSTICE_BACKEND_AUTH0_SCOPE"
                  )))
                  + [
                      {name: "SOLSTICE_BACKEND_BASE_URL", value: $backend_base_url},
                      {name: "SOLSTICE_BACKEND_AUTH0_CLIENT_ID", value: $backend_client_id},
                      {name: "SOLSTICE_BACKEND_AUTH0_AUDIENCE", value: $backend_audience},
                      {name: "SOLSTICE_BACKEND_AUTH0_SCOPE", value: $backend_scope}
                    ]
                )
              | .secrets = (
                  ((.secrets // []) | map(select(.name != "SOLSTICE_BACKEND_AUTH0_CLIENT_SECRET")))
                  + [{name: "SOLSTICE_BACKEND_AUTH0_CLIENT_SECRET", valueFrom: $backend_secret_arn}]
                )
            )
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' task-definition.json > next-task-definition.json
          jq -e --arg image "$IMAGE" \
            '.containerDefinitions | any(
              .name == "mcp-server"
              and .image == $image
              and (.environment | any(.name == "SOLSTICE_BACKEND_BASE_URL"))
              and (.secrets | any(.name == "SOLSTICE_BACKEND_AUTH0_CLIENT_SECRET"))
            )' \
            next-task-definition.json > /dev/null
          TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://next-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy ECS service
        env:
          TASK_ARN: ${{ steps.task.outputs.arn }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_ARN" \
            --force-new-deployment
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"

      - name: Diagnose failed deployment
        if: failure()
        run: |
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].events[:10].[createdAt,message]' \
            --output table
          TASKS=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_SERVICE" \
            --desired-status STOPPED \
            --max-items 10 \
            --query 'taskArns' \
            --output text)
          if [ -n "$TASKS" ] && [ "$TASKS" != "None" ]; then
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks $TASKS \
              --query 'tasks[].{task:taskArn,reason:stoppedReason,containers:containers[].{name:name,reason:reason,exitCode:exitCode}}' \
              --output json
          fi

      - name: Smoke test
        id: smoke
        env:
          RESOURCE_URL: ${{ env.RESOURCE_URL }}
        run: |
          ORIGIN="${RESOURCE_URL%/mcp}"
          curl --fail --silent --show-error "$ORIGIN/health" | jq -e '.status == "ok"'
          curl --fail --silent --show-error \
            "$ORIGIN/.well-known/oauth-protected-resource/mcp" \
            | jq -e --arg resource "$RESOURCE_URL" \
              '.resource == $resource and (.scopes_supported | index("mcp:connect"))'
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$RESOURCE_URL")
          test "$STATUS" = "401"

      - name: Sync AgentCore gateway tool schema
        run: |
          aws bedrock-agentcore-control synchronize-gateway-targets \
            --gateway-identifier "$GATEWAY_ID" \
            --target-id-list "$GATEWAY_TARGET_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws bedrock-agentcore-control get-gateway-target \
              --gateway-identifier "$GATEWAY_ID" \
              --target-id "$GATEWAY_TARGET_ID" \
              --query status --output text)
            echo "Gateway target status: $STATUS"
            case "$STATUS" in
              READY) exit 0 ;;
              SYNCHRONIZING|UPDATING) sleep 10 ;;
              *)
                aws bedrock-agentcore-control get-gateway-target \
                  --gateway-identifier "$GATEWAY_ID" \
                  --target-id "$GATEWAY_TARGET_ID" \
                  --query statusReasons
                exit 1 ;;
            esac
          done
          echo "Timed out waiting for gateway target sync"
          exit 1

      # Only a smoke-test failure rolls back the service; a gateway sync failure
      # leaves the (healthy) deploy in place and just fails the workflow.
      - name: Roll back on smoke failure
        if: failure() && steps.smoke.outcome == 'failure' && steps.task.outputs.previous_arn != ''
        env:
          PREVIOUS_ARN: ${{ steps.task.outputs.previous_arn }}
        run: |
          echo "Smoke test failed; rolling back to $PREVIOUS_ARN"
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$PREVIOUS_ARN" \
            --force-new-deployment
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
